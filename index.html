<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hora Contraria</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

/* TARJETA */
.container{
    background:#1c1c2e;
    padding:35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,0.6);
    width:320px;
    margin-bottom:40px;
}

.container h2{
    margin-bottom:20px;
    font-weight:600;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    font-size:16px;
    background:#2a2a40;
    color:white;
    outline:none;
    transition:0.3s;
}

input:focus{
    background:#333355;
}

button{
    margin-top:15px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #00c6ff;
}

#resultado{
    margin-top:18px;
    font-size:18px;
    color:#00ffcc;
    font-weight:500;
}

/* RELOJ */
.clock{
    width:220px;
    height:220px;
    border:8px solid #fff;
    border-radius:50%;
    position:relative;
    background:#111;
    box-shadow:0 0 30px rgba(0,255,255,0.4);
}

.number{
    position:absolute;
    color:white;
    font-size:18px;
    font-weight:bold;
}

.hand{
    position:absolute;
    bottom:50%;
    left:50%;
    transform-origin:bottom;
    transform:translateX(-50%);
}

.hour{
    width:6px;
    height:55px;
    background:white;
    border-radius:4px;
}

.minute{
    width:4px;
    height:75px;
    background:#00ffcc;
    border-radius:4px;
}
</style>
</head>
<body>

<div class="container">
    <h2>Hora Contraria</h2>
    <h3>Leonardo Chambi Romero</h3>
    <input type="number" id="hora" placeholder="Hora (1-12)">
    <input type="number" id="minuto" placeholder="Minutos (0-59)">
    <button onclick="calcular()">Calcular</button>
    <div id="resultado"></div>
</div>

<div class="clock" id="clock">
    <div class="hand hour" id="hourHand"></div>
    <div class="hand minute" id="minuteHand"></div>
</div>

<script>
// Agregar números al reloj
const clock = document.getElementById("clock");
for(let i=1;i<=12;i++){
    let number = document.createElement("div");
    number.className = "number";
    number.innerText = i;

    let angle = (i * 30) * Math.PI / 180;
    let radius = 90;

    number.style.left = 110 + radius * Math.sin(angle) - 10 + "px";
    number.style.top = 110 - radius * Math.cos(angle) - 10 + "px";

    clock.appendChild(number);
}

function calcular(){
    let h = parseInt(document.getElementById("hora").value);
    let m = parseInt(document.getElementById("minuto").value);

    if(h < 1 || h > 12 || m < 0 || m > 59){
        alert("Valores inválidos");
        return;
    }

    // SOLO hora contraria (+6)
    let hora_opuesta = (h + 6) % 12;
    if(hora_opuesta == 0) hora_opuesta = 12;

    document.getElementById("resultado").innerHTML =
        "Hora contraria: " + hora_opuesta + ":" + String(m).padStart(2,'0');

    moverReloj(hora_opuesta, m);
}

function moverReloj(h, m){
    let hourDeg = (h % 12) * 30 + m * 0.5;
    let minuteDeg = m * 6;

    document.getElementById("hourHand").style.transform =
        "translateX(-50%) rotate(" + hourDeg + "deg)";

    document.getElementById("minuteHand").style.transform =
        "translateX(-50%) rotate(" + minuteDeg + "deg)";
}
</script>

</body>
</html>
